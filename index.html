<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TORERUNO Block Puzzle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <img src="logo.png" alt="TORERUNO" class="header-logo">
            <div id="score-display">SCORE: <span id="score">0</span></div>
        </header>

        <div class="nav-bar">
            <button id="home-btn" class="nav-btn">🏠HOME</button>
            <button id="undo-btn" class="nav-btn">↩UNDO</button>
        </div>

        <main>
            <div id="grid-container" class="grid-container"></div>
            <div id="piece-tray" class="piece-tray"></div>
        </main>

        <div id="main-menu" class="overlay">
            <div class="overlay-content">
                <img src="logo.png" alt="TORERUNO" class="menu-logo">
                <h3>癒しのパズル</h3>
                <div class="difficulty-options">
                    <button class="difficulty-btn" data-size="8">EASY (8x8)</button>
                    <button class="difficulty-btn" data-size="10">NORMAL (10x10)</button>
                </div>
            </div>
        </div>

        <div id="game-over-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>GAME OVER</h2>
                <div class="final-score">SCORE: <span id="final-score-val">0</span></div>
                <button id="restart-btn" class="restart-btn">もう一度</button>
            </div>
        </div>
        
        <div id="flash-layer" class="flash-layer"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
