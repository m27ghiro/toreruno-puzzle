<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TORERUNO Block Puzzle | 究極の癒しパズル</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <div class="header-top">
                <img src="logo.png" alt="TORERUNO Logo" class="header-logo">
            </div>
            <div class="header-bottom">
                <div class="header-actions">
                    <button id="home-btn" class="nav-btn">🏠 最初から</button>
                    <button id="undo-btn" class="nav-btn">↩ 戻る</button>
                </div>
                <div class="score-container">
                    <div class="score-label">SCORE</div>
                    <div id="score" class="score-value">0</div>
                </div>
            </div>
        </header>

        <main>
            <!-- メインメニュー -->
            <div id="main-menu" class="overlay">
                <div class="overlay-content">
                    <img src="logo.png" alt="TORERUNO Logo" class="menu-logo">
                    <h2>癒しのパズル</h2>
                    <p>難易度を選んでスタート</p>
                    <div class="difficulty-options">
                        <button class="difficulty-btn" data-size="8">8 x 8 (Easy)</button>
                        <button class="difficulty-btn" data-size="10">10 x 10 (Standard)</button>
                    </div>
                </div>
            </div>

            <div id="grid-container" class="grid-container">
                <!-- Grid will be generated by JS -->
            </div>

            <div id="piece-tray" class="piece-tray">
                <!-- Pieces will be generated here -->
            </div>
        </main>

        <footer>
            <p>© 2024 TORERUNO - Relaxation & Beauty</p>
        </footer>

        <!-- Overlay for Game Over -->
        <div id="game-over-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>GAME OVER</h2>
                <p>癒しの時間はまた次回に。</p>
                <div class="final-score">SCORE: <span id="final-score-val">0</span></div>
                <button id="restart-btn" class="restart-btn">メニューへ戻る</button>
            </div>
        </div>
        
        <!-- Flash Effect Layer -->
        <div id="flash-layer" class="flash-layer"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
