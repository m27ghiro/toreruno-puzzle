<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TORERUNO Block Puzzle</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <img src="logo.png" alt="TORERUNO" class="header-logo">
            <div class="header-info">
                <div class="score-box">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="btn-group">
                    <button id="home-btn" class="nav-btn">🏠HOME</button>
                    <button id="undo-btn" class="nav-btn">↩UNDO</button>
                </div>
            </div>
        </header>

        <main id="game-main">
            <div id="grid-container" class="grid-container">
                <!-- Grid generated by JS -->
            </div>
            <div id="piece-tray" class="piece-tray">
                <!-- Pieces generated by JS -->
            </div>
        </main>

        <!-- Overlays -->
        <div id="main-menu" class="overlay">
            <div class="overlay-content">
                <img src="logo.png" alt="TORERUNO" class="menu-logo">
                <h2>癒しのパズル</h2>
                <div class="difficulty-options">
                    <button class="difficulty-btn" data-size="8">EASY (8x8)</button>
                    <button class="difficulty-btn" data-size="10">NORMAL (10x10)</button>
                </div>
            </div>
        </div>

        <div id="game-over-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>GAME OVER</h2>
                <div class="final-score">SCORE: <span id="final-score-val">0</span></div>
                <button id="restart-btn" class="restart-btn">もう一度</button>
            </div>
        </div>
        
        <div id="flash-layer" class="flash-layer"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
